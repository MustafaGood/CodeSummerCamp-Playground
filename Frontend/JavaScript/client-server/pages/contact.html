<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Code Summer Camp Kontakt</title>
        <script src="../node_modules/jquery/dist/jquery.min.js"></script>
        <link rel="stylesheet" href="./css/styles.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                background-color: #f5f7fa;
                color: #333;
            }
            .container {
                max-width: 800px;
                margin: 40px auto;
                background: rgba(255, 255, 255, 0.95);
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
                backdrop-filter: blur(10px);
            }
            h2 {
                margin-top: 0;
                font-size: 1.5em;
                border-bottom: 2px solid #3498db;
                padding-bottom: 10px;
                color: #2d3748;
            }
            .contact-section {
                margin-bottom: 20px;
                background: rgba(255, 255, 255, 0.8);
                padding: 15px;
                border-radius: 8px;
            }
            .icon {
                font-size: 1.2em;
                margin-right: 8px;
            }
            .contact-item a {
                color: #3498db;
                text-decoration: none;
                transition: color 0.3s ease;
            }
            .contact-item a:hover {
                color: #2c5282;
                text-decoration: underline;
            }
            .contact-item {
                margin-bottom: 10px;
                padding: 8px;
                border-radius: 4px;
                transition: background-color 0.3s ease;
            }
            .contact-item:hover {
                background-color: rgba(52, 152, 219, 0.1);
            }
            .content-overlay {
                position: relative;
                z-index: 1;
                width: 100%;
                min-height: calc(100vh - 120px);
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(0, 0, 0, 0.3);
            }
        </style>
    </head>

    <body>
        <!--Navigation bar with links / webpage title-->
        <header class="nav-bar">
            <a class="nav-content" id="nav-title" href="/"><h1>Code Summer Camp</h1></a>
            <nav class="nav-links">
                <ul class="nav-content nav-links">
                    <li><a href="/">Hem</a></li>
                    <li><a href="/contact">Kontakt</a></li>
                    <li><a href="/about">Om oss</a></li>
                    <li hidden><a href="#" page-type="login">Sign in</a></li>             
                    <li><a href="#" page-type="login">Sign out</a></li>             
                </ul>
            </nav>
        </header>
        
        <!--Main page content-->
        <div class="page-container">
            <div class="video-container">
                <video autoplay muted loop playsinline>
                    <source src="video/4709300-uhd_4096_2160_25fps.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="content-overlay">
                <div class="container">
                    <h2>Kontakt och frågor om Code Summer Camp</h2>
                
                    <div class="contact-section">
                        <p><span class="icon">👤</span><strong>Projektledare</strong></p>
                        <p>Mattias Hellström</p>
                    </div>
                
                    <div class="contact-section">
                        <p><span class="icon">📇</span><strong>Kontaktuppgifter</strong></p>
                        <div class="contact-item">
                            <span class="icon">📧</span>
                            <a href="mailto:mattias.hellstrom@skill.se">mattias.hellstrom@skill.se</a>
                        </div>
                        <div class="contact-item">
                            <span class="icon">☎️</span>
                            <a href="tel:013329419">013–32 94 19</a>
                        </div>
                        <div class="contact-item">
                            <span class="icon">📱</span>
                            <a href="tel:0790064699">0790–06 46 99</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!--Footer/company logo-->
        <div class="footer">
            <img src="./images/Skill_Logo_RGB_Blue.png" alt="Logo for Skill." class="logo">
        </div>

    </body>
</html>
